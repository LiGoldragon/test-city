[pack]
name = "test-expanded-inert"
schema = 2

[[agent]]
name = "mayor"
start_command = "bash \"$GC_CITY/agents/mayor/run.sh\""
prompt_mode = "none"
process_names = ["bash", "sh", "tail"]
max_active_sessions = 1

[[agent]]
name = "deacon"
start_command = "bash \"$GC_CITY/agents/deacon/run.sh\""
prompt_mode = "none"
process_names = ["bash", "sh", "tail"]
max_active_sessions = 1
depends_on = ["mayor"]

[[agent]]
name = "worker"
start_command = "bash \"$GC_CITY/agents/worker/run.sh\""
prompt_mode = "none"
process_names = ["bash", "sh", "tail"]
min_active_sessions = 2
max_active_sessions = 2
depends_on = ["mayor"]

[[agent]]
name = "auditor"
start_command = "bash \"$GC_CITY/agents/auditor/run.sh\""
prompt_mode = "none"
process_names = ["bash", "sh", "tail"]
max_active_sessions = 1

[[named_session]]
template = "mayor"
mode = "always"

[[named_session]]
template = "deacon"
mode = "always"

[[named_session]]
template = "auditor"
mode = "on_demand"
