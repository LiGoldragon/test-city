[workspace]
name = "test-expanded-inert"
prefix = "tei"
install_agent_hooks = []
max_active_sessions = 8

[daemon]
patrol_interval = "15s"
max_restarts = 3
restart_window = "1m"
shutdown_timeout = "2s"
probe_concurrency = 2
max_wakes_per_tick = 4

[session]
startup_timeout = "300s"

[orders]
skip = [
  "beads-health",
  "cross-rig-deps",
  "digest-generate",
  "dolt-gc-nudge",
  "dolt-health",
  "dolt-remotes-patrol",
  "gate-sweep",
  "mol-dog-backup",
  "mol-dog-compactor",
  "mol-dog-doctor",
  "mol-dog-jsonl",
  "mol-dog-phantom-db",
  "mol-dog-reaper",
  "mol-dog-stale-db",
  "orphan-sweep",
  "prune-branches",
  "spawn-storm-detect",
  "wisp-compact",
]
